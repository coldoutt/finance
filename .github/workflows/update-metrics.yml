name: Update CBR metrics

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cbr-metrics
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Load current CBR data
        run: node server/scripts/update-static-metrics.js

      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.json
          if git diff --cached --quiet; then
            echo "Metrics have not changed"
            exit 0
          fi
          git commit -m "Update CBR metrics"
          git pull --rebase
          git push
